# DLIAssets - Resource Pack Management
# Handles generation, hosting (builtin HTTP), and auto-download for players

pack:
  # Basic Info
  name: "DLI Assets"
  description: "<gradient:#ff0000:#ff8800>Custom Items, Blocks & Mobs</gradient>\n<gray>Required for DLIAssets plugin</gray>"
  version: "1.0.0"
  # Minecraft pack format (12 for 1.20.5+, 15 for 1.21+)
  pack-format: 15
  
  # Namespaces
  # Plugin namespace (used for items/blocks/models: dliassets:ruby)
  namespace: "dliassets"
  # Minecraft namespace override (for overriding vanilla textures)
  # minecraft-namespace: "minecraft"

  # ==========================
  # GENERATION SETTINGS
  # ==========================
  generation:
    # Auto-generate pack from items.yml, blocks.yml, mobs.yml on plugin enable
    enabled: true
    # Output directory (inside plugin data folder)
    output-dir: "generated_pack"
    # Clean output dir before generation
    clean-before: true
    # Generate models for items/blocks automatically (basic parents)
    auto-models: true
    # Generate blockstates for blocks with variants (fence, lamp, crop)
    auto-blockstates: true
    # Generate entity models (basic placeholder)
    auto-entity-models: false # Complex, usually manual
    
    # Texture Handling
    textures:
      # Source folder for custom textures (put your .png files here)
      source-dir: "textures" 
      # If texture missing, generate a placeholder (magenta checkerboard)
      generate-placeholders: true
      # Compress PNGs (optipng/zopfli) - requires binary or library
      optimize: false

  # ==========================
  # DISTRIBUTION / HOSTING
  # ==========================
  distribution:
    # 1. BUILTIN HTTP SERVER (Paper/Velocity built-in)
    # Serves pack at http://<server-ip>:<port>/dliassets/pack.zip
    builtin-server:
      enabled: true
      # Path segment (URL: /dliassets/pack.zip)
      path: "dliassets"
      # Max file size for builtin server (Paper limit ~50-100MB usually)
      # If pack > limit, fallback to external URL
      max-size-mb: 50
    
    # 2. EXTERNAL HOSTING (CDN, Web Server, GitHub Releases, File.io, etc.)
    # Used if builtin disabled OR pack too large
    external:
      enabled: false
      # Direct download URL to .zip
      url: "https://cdn.myserver.com/dliassets/pack.zip"
      # Optional: SHA-256 hash for integrity check (client verifies)
      sha256: ""
      # Force external even if small
      force: false

  # ==========================
  # PLAYER AUTO-DOWNLOAD
  # ==========================
  auto-download:
    # Require pack on join (kick if refuse/timeout)
    required: true
    # Prompt message (MiniMessage)
    prompt: "<yellow>This server requires the <gold>DLI Assets</gold> resource pack.\n<gray>Click <green>Yes</gray> to download and join.</gray>"
    # Timeout in seconds before kick
    timeout: 60
    # Show prompt on every join (if not required, just prompt)
    prompt-on-join: true
    # Allow "Later" button (delays prompt)
    allow-delay: true
    delay-duration: 300 # 5 mins

  # ==========================
  # CONTENT MAPPING (Generated from configs)
  # ==========================
  # These are populated automatically by the generator reading items.yml, blocks.yml, mobs.yml
  # Manual overrides can be placed here if needed.
  content:
    items: {}    # Populated from items.yml -> models/item/*.json
    blocks: {}   # Populated from blocks.yml -> models/block/*.json + blockstates/
    entities: {} # Populated from mobs.yml -> models/entity/*.json (or model engine)

  # ==========================
  # FONTS & LANG
  # ==========================
  fonts:
    # Custom font for MiniMessage hex gradients support (included by default in Paper)
    # Or add custom glyphs
    enabled: true
    # Path to .ttf in assets/minecraft/font/
    custom-fonts: []
  
  language:
    # Default language file (assets/dliassets/lang/en_us.json)
    default: "en_us"
    # Supported languages (auto-generated keys from displaynames)
    supported: ["en_us", "tr_tr"]

  # ==========================
  # ADVANCED / PERFORMANCE
  # ==========================
  performance:
    # Cache generated pack zip in memory
    cache-zip: true
    # Async generation (off main thread)
    async-generation: true
    # Parallel texture processing
    parallel-textures: true